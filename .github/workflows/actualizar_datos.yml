name: Actualizar datos

on:
  schedule:
    - cron: "0 13 * * *" # todos los días 10:00 America/Santiago (13:00 UTC)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Traer datos del Banco Central
        env:
          BCCH_USER: ${{ secrets.BCCH_USER }}
          BCCH_PASSWORD: ${{ secrets.BCCH_PASSWORD }}
        run: python fetch_bcch.py
        working-directory: data_pipeline

      - name: Traer datos de mercado
        run: python fetch_market.py
        working-directory: data_pipeline

      - name: Traer datos de la Reserva Federal (FRED)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python fetch_fred.py
        working-directory: data_pipeline

      - name: Generar reporte HTML
        run: python generar_reporte_html.py
        working-directory: app

      - name: Comitear cambios si hay datos nuevos
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/historico.csv data/pib_por_estado_eeuu.json docs/index.html
          git diff --cached --quiet && echo "Sin cambios" || git commit -m "Actualizar datos económicos"
          git push
